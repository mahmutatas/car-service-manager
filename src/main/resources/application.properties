spring.application.name=car-service-manager
spring.amqp.deserialization.trust.all=true

server.port=${SERVER_PORT:8080}

spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:carservice}
spring.datasource.username=${DB_USER:carservice}
spring.datasource.password=${DB_PASSWORD:carservice}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.health.rabbit.enabled=true

app.messaging.exchange=${APP_EVENTS_EXCHANGE:car-service.events}
app.messaging.audit-queue=${APP_AUDIT_QUEUE:car-service.audit-log}